<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="520" viewBox="0 0 1800 520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#0d1626"/>
    </linearGradient>
    <style>
      .mono { font-family: "Courier New", Consolas, monospace; fill: #ffffff; }
      .title { font-size: 28px; font-weight: 500; }
      .body { font-size: 24px; }
      .small { font-size: 22px; }
      .box { fill: none; stroke: #ffffff; stroke-width: 2.4; }
      .arrow { stroke: #ffffff; stroke-width: 2.4; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#ffffff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="520" fill="url(#bg)"/>

  <!-- Boxes -->
  <rect class="box" x="60" y="50" width="290" height="330"/>
  <rect class="box" x="660" y="50" width="290" height="330"/>
  <rect class="box" x="1180" y="50" width="290" height="410"/>

  <!-- Front-end -->
  <text class="mono title" x="205" y="100" text-anchor="middle">Front-end</text>
  <text class="mono title" x="205" y="140" text-anchor="middle">Angular 20</text>
  <text class="mono title" x="205" y="180" text-anchor="middle">(port 4200)</text>

  <text class="mono body" x="100" y="260">- SPA</text>
  <text class="mono body" x="100" y="305">- Lazy loading</text>
  <text class="mono body" x="100" y="350">- Proxy dev</text>

  <!-- API -->
  <text class="mono title" x="805" y="100" text-anchor="middle">API REST</text>
  <text class="mono title" x="805" y="140" text-anchor="middle">Spring Boot 3</text>
  <text class="mono title" x="805" y="180" text-anchor="middle">(port 8080)</text>

  <text class="mono body" x="700" y="260">- JWT + CSRF</text>
  <text class="mono body" x="700" y="305">- DTO/Entity</text>
  <text class="mono body" x="700" y="350">- Swagger</text>

  <!-- DB -->
  <text class="mono title" x="1325" y="100" text-anchor="middle">MySQL</text>
  <text class="mono title" x="1325" y="140" text-anchor="middle">(Docker)</text>

  <text class="mono body" x="1220" y="260">- Users</text>
  <text class="mono body" x="1220" y="305">- Topics</text>
  <text class="mono body" x="1220" y="350">- Posts</text>
  <text class="mono body" x="1220" y="395">- Comments</text>
  <text class="mono body" x="1220" y="440">- Subscriptions</text>

  <!-- Arrows and labels -->
  <line class="arrow" x1="370" y1="90" x2="635" y2="90" marker-end="url(#arrowhead)"/>
  <text class="mono title" x="500" y="60" text-anchor="middle">/api/*</text>

  <text class="mono body" x="385" y="140">Bearer JWT +</text>
  <text class="mono body" x="385" y="180">X-XSRF-TOKEN</text>
  <text class="mono body" x="385" y="220">+ cookies</text>

  <line class="arrow" x1="640" y1="250" x2="365" y2="250" marker-end="url(#arrowhead)"/>
  <text class="mono body" x="470" y="295" text-anchor="middle">JSON + cookies</text>

  <line class="arrow" x1="975" y1="90" x2="1155" y2="90" marker-end="url(#arrowhead)"/>
  <text class="mono title" x="1065" y="60" text-anchor="middle">JPA</text>
</svg>
